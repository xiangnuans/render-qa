<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tiny tap target — RenderGuard fixture</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; padding: 40px; }
      /* A close button that is far too small to reliably tap on touch. */
      .close {
        width: 16px;
        height: 16px;
        line-height: 16px;
        padding: 0;
        border: 1px solid #999;
        background: #fff;
        color: #111;
      }
    </style>
  </head>
  <body>
    <button class="close" aria-label="Close">x</button>
  </body>
</html>
